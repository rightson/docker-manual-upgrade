# =============================================================================
# GitLab required upgrade-path definition
# =============================================================================
#
# This file lists, in ascending order, the REQUIRED upgrade "stops" that a
# GitLab instance must pass through on the way to the target version. You must
# not skip a required stop: GitLab bakes database migrations and background
# migrations into these releases and jumping over one can corrupt data.
#
# The list below was prepared for an upgrade that STARTS on GitLab 16.1.x and
# ends on the latest release (19.1.2 as of 2026-07). The tooling automatically
# selects only the stops that are greater than the version actually detected on
# each server, so the same file works for both of your 16.1 servers.
#
# -----------------------------------------------------------------------------
# HOW TO VERIFY / UPDATE THIS LIST  (do this on the online Windows machine)
# -----------------------------------------------------------------------------
#   1. Open the official GitLab upgrade-path calculator:
#        https://gitlab-com.gitlab.io/support/toolbox/upgrade-path/
#      Enter your current version (e.g. 16.1.8) and target version.
#   2. Confirm each "stop" it prints matches a line below. Add/adjust as needed.
#   3. Always use the LATEST PATCH of a required minor (e.g. 16.7.10, not
#      16.7.0). endoflife.date/gitlab lists the newest patch of each minor.
#   4. Run the downloader with -Validate first; it HEAD-checks every URL so a
#      wrong patch number is caught BEFORE you download tens of GB.
#
# Format: one version per line, "MAJOR.MINOR.PATCH". Blank lines and lines
# starting with '#' are ignored. Keep them in ascending order.
# =============================================================================

# --- GitLab 16.x required stops ---
16.3.9
16.7.10
16.11.10

# --- GitLab 17.x required stops ---
17.1.8
17.3.7
17.5.5
17.8.7
17.11.7

# --- GitLab 18.x required stops (x.2 / x.5 / x.8 / x.11 cadence) ---
# Patches below were validated against packages.gitlab.com in 2026-07.
# NOTE: Ubuntu 20.04 (focal) .deb packages exist only up to 18.8.x; GitLab 19.x
# has NO focal packages. A .deb server on 20.04 cannot go past 18.8 without an
# OS upgrade to 22.04 (jammy). Docker installs are unaffected (host OS agnostic).
18.2.8
18.5.7
18.8.11
18.11.7

# --- Final target: latest available release ---
19.1.2
